<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout</title>

<style>
body{
  font-family:'Segoe UI';
  margin:0;
  background:#f5f5f5;
  padding:20px;
}

/* TITLE */
h1{
  margin-bottom:20px;
}

/* CART ITEM */
.cart-item{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.item-info{
  display:flex;
  align-items:center;
  gap:15px;
}

.item-info img{
  width:70px;
  border-radius:8px;
}

/* TOTAL */
.total-box{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* FORM */
.form{
  margin-top:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* BUTTON */
button{
  width:100%;
  background:#2e7d32;
  color:white;
  padding:12px;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}
</style>

</head>

<body>

<h1>Checkout</h1>

<div id="cartItems"></div>

<div class="total-box">
  <h3>Total: ₹<span id="total"></span></h3>
</div>

<!-- CUSTOMER DETAILS -->
<div class="form">
  <h3>Enter Details</h3>

  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <input type="text" id="address" placeholder="Address">
</div>

<button onclick="placeOrder()">Place Order on WhatsApp</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let html = "";

cart.forEach(item=>{
  html += `
    <div class="cart-item">
      <div class="item-info">
        <img src="images/${item.name.toLowerCase().replace(" ","")}.png">
        <div>
          <b>${item.name}</b><br>
          Qty: ${item.qty}
        </div>
      </div>

      <div>
        ₹${item.price * item.qty}
      </div>
    </div>
  `;

  total += item.price * item.qty;
});

document.getElementById("cartItems").innerHTML = html;
document.getElementById("total").innerText = total;

function placeOrder(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Please fill all details");
    return;
  }

  let message = "New Order:%0A";

  cart.forEach(item=>{
    message += `${item.name} x ${item.qty} = ₹${item.price * item.qty}%0A`;
  });

  message += `%0ATotal: ₹${total}`;
  message += `%0AName: ${name}`;
  message += `%0APhone: ${phone}`;
  message += `%0AAddress: ${address}`;

  window.location.href =
  "https://wa.me/918248320743?text=" + message;

  localStorage.removeItem("cart");
}
</script>

</body>
</html>
